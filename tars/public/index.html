<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0b" />
    <title>TARS</title>
    <link rel="icon" href="favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TARS" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo" aria-hidden="true"></span>
        <span class="brand-name">TARS</span>
      </div>
      <div class="status" id="status" title="Stav připojení">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">připojuji…</span>
      </div>
    </header>

    <!-- ===== ZÁPISNÍK ===== -->
    <section class="view" id="view-notes">
      <div class="capture">
        <textarea
          id="noteInput"
          rows="3"
          placeholder="Zapiš poznámku… (na hlas použij mikrofon na klávesnici)"
        ></textarea>
        <div class="capture-actions">
          <input type="file" id="fileInput" multiple hidden />
          <button type="button" class="btn ghost" id="attachBtn" title="Přidat soubor">
            ＋ Soubor
          </button>
          <button type="button" class="btn primary" id="saveNoteBtn">Uložit poznámku</button>
        </div>
        <div class="uploading" id="uploading" hidden></div>
      </div>

      <div class="entries" id="entries">
        <p class="hint" id="entriesHint">Načítám uložené…</p>
      </div>
    </section>

    <!-- ===== CHAT ===== -->
    <section class="view chat" id="view-chat" hidden>
      <div class="chat-toolbar">
        <label class="switch">
          <input type="checkbox" id="ragToggle" />
          <span class="knob"></span>
          <span class="switch-label">🧠 Odpovídat z mých poznámek</span>
        </label>
        <button type="button" class="reindex" id="reindexBtn" title="Znovu načíst poznámky do paměti">
          ↻
        </button>
      </div>
      <div class="chat-scroll" id="chat">
        <div class="empty" id="empty">
          <span class="logo big" aria-hidden="true"></span>
          <p>Ahoj Kristiáne. Napiš mi cokoliv.</p>
        </div>
      </div>
      <form class="composer" id="composer">
        <textarea id="input" rows="1" placeholder="Napiš zprávu…" autocomplete="off"></textarea>
        <button type="submit" id="send" aria-label="Odeslat">↑</button>
      </form>
    </section>

    <!-- ===== SPODNÍ ZÁLOŽKY ===== -->
    <nav class="tabs">
      <button class="tab active" data-view="notes" id="tab-notes">
        <span class="tab-ico">✎</span><span>Zápisník</span>
      </button>
      <button class="tab" data-view="chat" id="tab-chat">
        <span class="tab-ico">✦</span><span>Chat</span>
      </button>
    </nav>

    <script src="app.js"></script>
  </body>
</html>
