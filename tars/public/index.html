<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0b" />
    <title>TARS</title>
    <link rel="icon" href="favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TARS" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo" aria-hidden="true"></span>
        <span class="brand-name">TARS</span>
      </div>
      <div class="status" id="status" title="Stav připojení">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">připojuji…</span>
      </div>
    </header>

    <!-- ===== ZÁZNAM (chytrý zápis) ===== -->
    <section class="view" id="view-notes">
      <div class="capture">
        <textarea
          id="noteInput"
          rows="4"
          placeholder="Nadiktuj cokoliv — poznámku, člověka, úkol… TARS to sám zařadí. (Na hlas použij mikrofon na klávesnici.)"
        ></textarea>
        <div class="capture-actions">
          <input type="file" id="fileInput" multiple hidden />
          <button type="button" class="btn ghost" id="attachBtn">＋ Soubor</button>
          <button type="button" class="btn primary" id="saveNoteBtn">Ulož</button>
        </div>
        <div class="capture-result" id="captureResult" hidden></div>
        <div class="uploading" id="uploading" hidden></div>
      </div>
      <div class="entries" id="entries">
        <p class="hint">Načítám uložené…</p>
      </div>
    </section>

    <!-- ===== LIDÉ ===== -->
    <section class="view" id="view-people" hidden>
      <div class="capture">
        <input id="personName" class="field" type="text" placeholder="Jméno (např. František – soused)" />
        <textarea id="personInfo" rows="3" placeholder="Kdo to je, kontext, co si pamatovat…"></textarea>
        <div class="capture-actions">
          <button type="button" class="btn primary" id="savePersonBtn">Uložit člověka</button>
        </div>
      </div>
      <div class="entries" id="people">
        <p class="hint">Načítám lidi…</p>
      </div>
    </section>

    <!-- ===== PŘEHLED ===== -->
    <section class="view" id="view-overview" hidden>
      <div class="overview">
        <div class="stats" id="stats">
          <div class="stat"><span class="num" id="stNotes">–</span><span class="lbl">poznámek</span></div>
          <div class="stat"><span class="num" id="stFiles">–</span><span class="lbl">souborů</span></div>
          <div class="stat"><span class="num" id="stPeople">–</span><span class="lbl">lidí</span></div>
        </div>
        <button type="button" class="btn primary big" id="briefBtn">☀ Vytvoř denní přehled</button>
        <div class="briefing" id="briefing"></div>
        <button type="button" class="btn ghost" id="reindexBtn">🧠 Obnovit paměť z poznámek</button>
        <p class="hint small" id="reindexHint"></p>
      </div>
    </section>

    <!-- ===== CHAT ===== -->
    <section class="view chat" id="view-chat" hidden>
      <div class="chat-scroll" id="chat">
        <div class="empty" id="empty">
          <span class="logo big" aria-hidden="true"></span>
          <p>Ahoj Kristiáne. Zeptej se mě na cokoliv — znám tvoje poznámky.</p>
        </div>
      </div>
      <form class="composer" id="composer">
        <textarea id="input" rows="1" placeholder="Napiš zprávu…" autocomplete="off"></textarea>
        <button type="submit" id="send" aria-label="Odeslat">↑</button>
      </form>
    </section>

    <!-- ===== SPODNÍ ZÁLOŽKY ===== -->
    <nav class="tabs">
      <button class="tab active" data-view="notes">
        <span class="tab-ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M6 11a6 6 0 0 0 12 0"/><path d="M12 17v4"/><path d="M9 21h6"/></svg>
        </span><span>Záznam</span>
      </button>
      <button class="tab" data-view="people">
        <span class="tab-ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 20c0-3 2.4-5 5.5-5s5.5 2 5.5 5"/><path d="M16.5 5.6a3 3 0 0 1 0 5.8"/><path d="M18.5 20c0-2.3-1.1-4-2.8-4.7"/></svg>
        </span><span>Lidé</span>
      </button>
      <button class="tab" data-view="overview">
        <span class="tab-ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="7" r="1"/><circle cx="5" cy="12" r="1"/><circle cx="5" cy="17" r="1"/><path d="M9 7h11"/><path d="M9 12h11"/><path d="M9 17h11"/></svg>
        </span><span>Přehled</span>
      </button>
      <button class="tab" data-view="chat">
        <span class="tab-ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16v10H9l-4 4z"/></svg>
        </span><span>Chat</span>
      </button>
    </nav>

    <script src="app.js"></script>
  </body>
</html>
